<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0A0B12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EXAMBREAKER">
  <meta name="description" content="Elite educational platform for exam preparation">
  <meta name="keywords" content="education, exams, haiti">
  <title>EXAMBREAKER HT | Elite Educational Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:wght@100..800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    :root {
      --bg-primary: #0A0B12;
      --bg-secondary: #121420;
      --bg-tertiary: #1A1D2E;
      --card-bg: rgba(16, 19, 32, 0.9);
      --card-hover: rgba(24, 28, 44, 0.95);
      --text-primary: #E8EBF2;
      --text-secondary: #9CA3B8;
      --text-tertiary: #6B7280;
      --accent-primary: #8B5CF6;
      --accent-secondary: #06B6D4;
      --accent-gold: #FBBF24;
      --accent-red: #F87171;
      --border-soft: rgba(139, 92, 246, 0.15);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, #0A0B12 0%, #1A1D2E 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--transition);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(15px, -15px); }
    }

    /* ===== SPLASH SCREEN ===== */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0A0B12 0%, #1A1D2E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease-out;
    }

    #splashScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .glitch-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 2px;
      color: var(--accent-primary);
      margin-bottom: 40px;
      position: relative;
      animation: glitchAppear 1s ease-in-out;
    }

    @keyframes glitchAppear {
      0% {
        opacity: 0;
        text-shadow: -2px 0 #06B6D4, 2px 0 #F87171;
        transform: translate(-4px, 0);
      }
      50% {
        text-shadow: -2px 0 #06B6D4, 2px 0 #F87171;
        transform: translate(4px, 0);
      }
      100% {
        opacity: 1;
        text-shadow: none;
        transform: translate(0, 0);
      }
    }

    .typewriter-container {
      max-width: 500px;
      background: rgba(16, 19, 32, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 32px;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--accent-secondary);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      margin-bottom: 40px;
      box-shadow: var(--shadow-soft);
    }

    .typewriter-text {
      position: relative;
      color: var(--accent-secondary);
      word-break: break-word;
    }

    .typewriter-text::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 2px;
      height: 1.2em;
      background: var(--accent-secondary);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .splash-button {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      color: white;
      padding: 16px 48px;
      border-radius: 50px;
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
      margin-top: auto;
    }

    .splash-button:active {
      transform: scale(0.95);
    }

    /* ===== MAIN LAYOUT ===== */
    #app {
      max-width: 768px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
      padding-bottom: 100px;
      width: 100%;
    }

    .screen {
      display: none;
      padding: 16px;
      padding-top: 20px;
      animation: screenEnter 0.5s var(--ease-bounce);
      min-height: 100vh;
    }

    .screen.active {
      display: block;
    }

    @keyframes screenEnter {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-soft);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      transition: var(--transition);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: var(--accent-primary);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.15);
      transform: translateY(-2px);
    }

    .card-header {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
    }

    /* ===== BUTTONS ===== */
    .btn {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      color: var(--accent-primary);
    }

    .btn-secondary:hover {
      background: var(--card-hover);
      border-color: var(--accent-primary);
    }

    /* ===== FORM ELEMENTS ===== */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      margin-bottom: 12px;
      transition: var(--transition);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    /* ===== TOGGLE SWITCH ===== */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--text-tertiary);
      transition: var(--transition);
      border-radius: 28px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: var(--transition);
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: var(--accent-primary);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 16px;
      overflow-x: auto;
    }

    .tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    /* ===== BOTTOM NAVIGATION ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border-top: 1px solid var(--border-soft);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 20px 0;
      max-width: 768px;
      margin: 0 auto;
      z-index: 100;
      left: 50%;
      transform: translateX(-50%);
      backdrop-filter: blur(16px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.7rem;
      transition: var(--transition);
      font-weight: 600;
    }

    .nav-item.active {
      color: var(--accent-primary);
    }

    .nav-item i {
      font-size: 1.4rem;
    }

    /* ===== TOAST NOTIFICATIONS ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 16px;
      right: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-primary);
      animation: toastSlide 0.3s ease-out;
      box-shadow: var(--shadow-soft);
      z-index: 1000;
    }

    .toast.success {
      border-color: rgba(34, 197, 94, 0.3);
    }

    .toast.error {
      border-color: rgba(248, 113, 113, 0.3);
    }

    @keyframes toastSlide {
      from {
        transform: translateX(400px);
      }
      to {
        transform: translateX(0);
      }
    }

    /* ===== EXAM CARD ===== */
    .exam-item {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }

    .exam-item:hover {
      background: var(--card-hover);
      border-color: var(--accent-primary);
    }

    .exam-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .exam-cost {
      color: var(--accent-gold);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .exam-countdown {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* ===== DASHBOARD STATS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(2px); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .glitch-title {
        font-size: 1.8rem;
      }

      .typewriter-container {
        padding: 20px;
        font-size: 0.85rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===== UTILITY ===== */
    .text-center {
      text-align: center;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    .mt-20 {
      margin-top: 20px;
    }

    .d-flex {
      display: flex;
      gap: 12px;
    }

    .flex-1 {
      flex: 1;
    }

    .opacity-75 {
      opacity: 0.75;
    }

    .loading {
      animation: pulse 2s infinite;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splashScreen">
    <div class="splash-container">
      <div class="glitch-title">J.P PHOENIX HAITI CORP</div>
      <div class="typewriter-container">
        <div class="typewriter-text" id="typewriterText"></div>
      </div>
      <button class="splash-button" onclick="AppCore.splash.hideSplash()">ENTRER DANS LE RÉSEAU</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <!-- AUTH SCREEN -->
    <div id="authScreen" class="screen">
      <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;">
        <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 30px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">EXAMBREAKER</h1>
        
        <div id="authForm" style="width: 100%; max-width: 300px;">
          <input type="email" id="emailInput" placeholder="Email" style="margin-bottom: 12px;">
          <input type="password" id="passwordInput" placeholder="Mot de passe" style="margin-bottom: 20px;">
          <button class="btn" onclick="AppCore.auth.login()" style="margin-bottom: 12px;">Se connecter</button>
          <button class="btn btn-secondary" onclick="AppCore.auth.signup()">Créer un compte</button>
        </div>

        <div id="referralForm" style="display:none; margin-top: 30px; width: 100%; max-width: 300px;">
          <p style="margin-bottom: 15px; color: var(--text-secondary);">Code de parrainage</p>
          <input type="text" id="referralInput" placeholder="Entrez un code (facultatif)">
          <button class="btn" onclick="AppCore.auth.redeemReferral()" style="margin-top: 12px;">Utiliser le code</button>
        </div>
      </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen" class="screen">
      <h2 style="font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 24px;" id="dashboardTitle">Tableau de Bord</h2>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="pointsDisplay">0</div>
          <div class="stat-label" id="pointsLabel">Points</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="streakDisplay">0</div>
          <div class="stat-label" id="streakLabel">Série</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header" id="missionsTitle">Missions</div>
        <button class="btn" onclick="AppCore.missions.perform('daily')" id="dailyBtn" style="margin-bottom: 8px;">
          <i class="fas fa-star"></i> <span id="dailyLabel">Défi Quotidien</span> (+5 XP)
        </button>
        <button class="btn" onclick="AppCore.missions.perform('share')" id="shareBtn" style="margin-bottom: 8px;">
          <i class="fas fa-share"></i> <span id="shareLabel">Partager</span> (+10 XP)
        </button>
        <button class="btn" onclick="AppCore.missions.showReferral()" id="referralBtn">
          <i class="fas fa-link"></i> <span id="referralLabel">Mon Code</span>
        </button>
      </div>

      <div class="card">
        <div class="card-header" id="vipTitle">Accès VIP</div>
        <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 0.9rem;" id="vipDesc">Déverrouiller avec 500 points pour un accès 3 jours avant</p>
        <button class="btn" onclick="AppCore.user.activateVIP()" id="vipBtn"><span id="vipLabel">Activer VIP</span> (500 pts)</button>
      </div>
    </div>

    <!-- EXAMS SCREEN -->
    <div id="examsScreen" class="screen">
      <h2 style="font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 24px;" id="examsTitle">Examens</h2>
      
      <div class="tabs">
        <button class="tab active" data-level="9af" id="tab9af">9AF</button>
        <button class="tab" data-level="ns4" id="tabNs4">NS4</button>
      </div>

      <div id="examsContainer"></div>
    </div>

    <!-- PROFILE SCREEN -->
    <div id="profileScreen" class="screen">
      <h2 style="font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 24px;" id="profileTitle">Profil</h2>

      <div class="card">
        <div class="card-header" id="myProfileTitle">Mon Profil</div>
        <p style="margin-bottom: 16px; color: var(--text-secondary);" id="emailDisplay">Email: ...</p>
        <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem;" id="pseudoLabel">Pseudo</label>
        <input type="text" id="pseudoInput" placeholder="Changer votre pseudo" style="margin-bottom: 12px;">
        <button class="btn" onclick="AppCore.user.updatePseudo()" id="updateBtn"><span id="updateLabel">Mettre à jour</span></button>
      </div>

      <div class="card">
        <div class="card-header" id="achievementsTitle">Réalisations</div>
        <div id="achievementsContainer" style="min-height: 100px;"></div>
      </div>

      <div class="card">
        <button class="btn btn-secondary" onclick="AppCore.auth.logout()" style="margin-bottom: 8px;">
          <i class="fas fa-sign-out-alt"></i> <span id="logoutLabel">Déconnexion</span>
        </button>
      </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settingsScreen" class="screen">
      <h2 style="font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 24px;" id="settingsTitle">Paramètres</h2>

      <div class="card">
        <div class="card-header" id="appearanceTitle">Apparence</div>
        <label style="display: block; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.9rem;" id="themeLabel">Thème</label>
        <select id="themeSelect" style="margin-bottom: 20px;">
          <option value="dark" id="darkOpt">Sombre</option>
          <option value="purple" id="purpleOpt">Violet</option>
          <option value="matrix" id="matrixOpt">Matrix</option>
        </select>

        <label style="display: block; margin-bottom: 12px; color: var(--text-secondary); font-size: 0.9rem;" id="langLabel">Langue</label>
        <select id="langSelect" style="margin-bottom: 20px;">
          <option value="ht" id="kreyolOpt">Kreyòl Ayisyen</option>
          <option value="fr" id="frenchOpt">Français</option>
          <option value="en" id="englishOpt">English</option>
        </select>
      </div>

      <div class="card">
        <div class="card-header" id="notificationsTitle">Notifications</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <label id="soundLabel">Sons</label>
          <label class="toggle-switch">
            <input type="checkbox" id="soundToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label id="vibrationLabel">Vibrations</label>
          <label class="toggle-switch">
            <input type="checkbox" id="vibrationToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="card">
        <div class="card-header" id="dataTitle">Données</div>
        <button class="btn btn-secondary" onclick="AppCore.storage.clearCache()">
          <i class="fas fa-trash"></i> <span id="clearCacheLabel">Vider le cache</span>
        </button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->

    // ===== AUDIO MANAGER =====
    class AudioManager {
      constructor() {
        this.enabled = localStorage.getItem('soundEnabled') !== 'false';
      }

      setEnabled(enabled) {
        this.enabled = enabled;
      }

      play(type) {
        if (!this.enabled) return;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        switch(type) {
          case 'success':
            oscillator.frequency.value = 800;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
            break;
          case 'error':
            oscillator.frequency.value = 300;
            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
            break;
        }
      }
    }

          toast.remove();

          document.getElementById('pointsDisplay').textContent = AppState.userData.points || 0;

        }

      renderExams() {
        const container = document.getElementById('examsContainer');
        const level = AppState.currentLevel;
        const exams = examData[level] || [];

        container.innerHTML = '';
        exams.forEach(exam => {
          const isUnlocked = AppState.userData?.unlockedExams?.includes(exam.id);
          const examCard = document.createElement('div');
          examCard.className = 'exam-item';
          
          const examDate = new Date(exam.date);
          const today = new Date();
          const daysLeft = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));

          examCard.innerHTML = `
            <div class="exam-info">
              <h3>${exam.name}</h3>
              <div class="exam-cost">${exam.cost} pts</div>
              <div class="exam-countdown">${daysLeft > 0 ? daysLeft + ' jours' : 'En cours'}</div>
            </div>
            <button class="btn ${isUnlocked ? 'btn-secondary' : ''}" 
              onclick="AppCore.exams.unlock('${exam.id}')" 
              ${isUnlocked ? 'disabled' : ''}
              style="width: 120px; padding: 10px;">
              ${isUnlocked ? '✓ Ouvert' : 'Déverrouiller'}
            </button>
          `;
          
          container.appendChild(examCard);
        });

    // ===== AUTH MANAGER =====
    class AuthManager {
      async login() {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;

        if (!email || !password) {
          AppCore.ui.showToast('Remplir tous les champs', 'error');
          return;
        }

        try {
          const result = await auth.signInWithEmailAndPassword(email, password);
          await AppCore.user.setCurrentUser(result.user);
          AppCore.ui.navigate('dashboard');
          AppState.soundManager.play('success');
        } catch (err) {
          AppCore.ui.showToast('Erreur de connexion: ' + err.message, 'error');
          AppState.soundManager.play('error');
        }
      }

      async signup() {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;

        if (!email || !password) {
          AppCore.ui.showToast('Remplir tous les champs', 'error');
          return;
        }

        try {
          const result = await auth.createUserWithEmailAndPassword(email, password);
          const referralCode = document.getElementById('referralInput').value;

          const userData = {
            email,
            points: referralCode ? 10 : 0,
            streak: 0,
            unlockedExams: [],
            achievements: [],
            createdAt: new Date(),
            theme: 'dark',
            language: 'ht',
            vipActive: false,
            vipExpires: null
          };

          await db.collection('users').doc(result.user.uid).set(userData);
          await AppCore.user.setCurrentUser(result.user);
          AppCore.ui.navigate('dashboard');
          AppState.soundManager.play('success');
        } catch (err) {
          AppCore.ui.showToast('Erreur: ' + err.message, 'error');
        }
      }

      redeemReferral() {
        const code = document.getElementById('referralInput').value;
        if (code) {
          AppCore.ui.showToast('Code utilisé!', 'success');
        }
      }

      logout() {
        auth.signOut();
        AppState.currentUser = null;
        AppState.userData = null;
        AppCore.ui.navigate('auth');
        AppCore.ui.showToast('Déconnecté', 'success');
      }

    // ===== USER MANAGER =====
    class UserManager {
      async setCurrentUser(user) {
        AppState.currentUser = user;
        
        try {
          const doc = await db.collection('users').doc(user.uid).get();
          AppState.userData = doc.data();
          
          if (!AppState.userData) {
            AppState.userData = {
              email: user.email,
              points: 0,
              streak: 0,
              unlockedExams: [],
              achievements: [],
              theme: 'dark',
              language: 'ht'
            };
            await db.collection('users').doc(user.uid).set(AppState.userData);
          }

          AppCore.ui.updateDashboard();
          AppCore.ui.renderExams();
          document.getElementById('emailDisplay').textContent = `Email: ${user.email}`;
        } catch (err) {
          console.error('Error loading user:', err);
        }
      }

      async updatePseudo() {
        const pseudo = document.getElementById('pseudoInput').value;
        if (!pseudo) {
          AppCore.ui.showToast('Entrez un pseudo', 'error');
          return;
        }

        try {
          await db.collection('users').doc(AppState.currentUser.uid).update({
            pseudo: pseudo
          });
          AppState.userData.pseudo = pseudo;
          AppCore.ui.showToast('Pseudo mis à jour!', 'success');
          document.getElementById('pseudoInput').value = '';
        } catch (err) {
          AppCore.ui.showToast('Erreur', 'error');
        }
      }

      async activateVIP() {
        if (AppState.userData.points < 500) {
          AppCore.ui.showToast('Pas assez de points (besoin 500)', 'error');
          return;
        }

        try {
          const now = new Date();
          const expiresAt = new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000);

          await db.collection('users').doc(AppState.currentUser.uid).update({
            points: firebase.firestore.FieldValue.increment(-500),
            vipActive: true,
            vipExpires: expiresAt
          });

          AppState.userData.points -= 500;
          AppState.userData.vipActive = true;
          AppState.userData.vipExpires = expiresAt;

          AppCore.ui.updateDashboard();
          AppCore.ui.showToast('VIP activé pour 3 jours!', 'success');
          AppState.soundManager.play('success');
        } catch (err) {
          AppCore.ui.showToast('Erreur', 'error');
        }
      }

      async unlockAchievement(id) {
        if (!AppState.userData.achievements) {
          AppState.userData.achievements = [];
        }
        if (!AppState.userData.achievements.includes(id)) {
          AppState.userData.achievements.push(id);
          try {
            await db.collection('users').doc(AppState.currentUser.uid).update({
              achievements: AppState.userData.achievements
            });
          } catch (err) {
            console.error('Achievement unlock error:', err);
          }
        }
      }
    }

    // ===== EXAM MANAGER =====
    class ExamManager {
      async unlock(examId) {
        const exam = Object.values(examData).flat().find(e => e.id === examId);
        if (!exam) return;

        const cost = exam.cost;
        if (AppState.userData.points < cost) {
          AppCore.ui.showToast('Pas assez de points', 'error');
          return;
        }

        try {
          await db.collection('users').doc(AppState.currentUser.uid).update({
            points: firebase.firestore.FieldValue.increment(-cost),
            unlockedExams: firebase.firestore.FieldValue.arrayUnion(examId)
          });

          AppState.userData.points -= cost;
          AppState.userData.unlockedExams.push(examId);
          
          AppCore.ui.showToast('✅ Examen déverrouillé!', 'success');
          AppCore.ui.renderExams();
          AppCore.ui.updateDashboard();
          AppState.soundManager.play('success');
        } catch (err) {
          AppCore.ui.showToast('Erreur', 'error');
        }
      }
    }

    // ===== MISSION MANAGER =====
    class MissionManager {
      async perform(missionType) {
        const today = new Date().toISOString().slice(0, 10);
        const key = `mission_${missionType}_${today}`;

        if (localStorage.getItem(key)) {
          AppCore.ui.showToast('Déjà complété aujourd\'hui', 'error');
          return;
        }

        const rewards = { share: 10, daily: 5, referral: 15 };
        const reward = rewards[missionType] || 0;

        if (missionType === 'share') {
          const text = `Découvrez EXAMBREAKER HT - Plateforme élite de préparation aux examens! ${window.location.href}`;
          if (navigator.share) {
            navigator.share({ title: 'EXAMBREAKER HT', text });
          } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
          }
        }

        try {
          await db.collection('users').doc(AppState.currentUser.uid).update({
            points: firebase.firestore.FieldValue.increment(reward)
          });

          localStorage.setItem(key, 'done');
          AppState.userData.points += reward;
          AppCore.ui.updateDashboard();
          AppCore.ui.showToast(`+${reward} XP gagné!`, 'success');
          AppState.soundManager.play('success');
        } catch (err) {
          AppCore.ui.showToast('Erreur', 'error');
        }
      }

      async showReferral() {
        if (!AppState.userData.referralCode) {
          AppState.userData.referralCode = AppState.currentUser.uid.slice(0, 8).toUpperCase();
          try {
            await db.collection('users').doc(AppState.currentUser.uid).update({
              referralCode: AppState.userData.referralCode
            });
          } catch (err) {
            console.error('Referral code error:', err);
          }
        }

        navigator.clipboard.writeText(AppState.userData.referralCode);
        AppCore.ui.showToast(`Code copié: ${AppState.userData.referralCode}`, 'success');
      }
    }

        sessionStorage.clear();
        AppCore.ui.showToast('Cache vidé', 'success');

    // ===== APP MANAGER =====
    class AppManager {
      async initialize() {
        AppState.soundManager = new AudioManager();
        const splash = new SplashManager();
        splash.show();

        const savedLang = localStorage.getItem('language') || 'ht';
        AppState.currentLanguage = savedLang;
        document.getElementById('langSelect').value = savedLang;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeSelect').value = savedTheme;

        this.setupEventListeners();
      }

      setupEventListeners() {
        // Theme change
        document.getElementById('themeSelect').addEventListener('change', (e) => {
          const theme = e.target.value;
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
        });

        // Language change
        document.getElementById('langSelect').addEventListener('change', (e) => {
          AppState.currentLanguage = e.target.value;
          localStorage.setItem('language', e.target.value);
          TranslationManager.updateUI();
          AppCore.ui.renderExams();
        });

        // Sound toggle
        document.getElementById('soundToggle').addEventListener('change', (e) => {
          AppState.soundManager.setEnabled(e.target.checked);
          localStorage.setItem('soundEnabled', e.target.checked);
        });

        // Vibration toggle
        document.getElementById('vibrationToggle').addEventListener('change', (e) => {
          localStorage.setItem('vibrationEnabled', e.target.checked);
        });

        // Nav items
        document.querySelectorAll('.nav-item').forEach(item => {
          item.addEventListener('click', () => {
            AppCore.ui.navigate(item.dataset.nav);
          });
        });

        // Exam tabs
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            AppState.currentLevel = tab.dataset.level;
            AppCore.ui.renderExams();
          });
        });

        // Load preferences
        document.getElementById('soundToggle').checked = localStorage.getItem('soundEnabled') !== 'false';
        document.getElementById('vibrationToggle').checked = localStorage.getItem('vibrationEnabled') !== 'false';

        TranslationManager.updateUI();
      }
    }

    // ===== CORE APP =====
    const AppCore = {
      ui: new UIManager(),
      auth: new AuthManager(),
      user: new UserManager(),
      exams: new ExamManager(),
      missions: new MissionManager(),
      storage: new StorageManager(),
      app: new AppManager(),
      splash: new SplashManager()
    };

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', () => {
      AppCore.app.initialize();
    });

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        await AppCore.user.setCurrentUser(user);
        AppCore.ui.navigate('dashboard');
      } else {
        document.getElementById('splashScreen').classList.add('hidden');
        AppCore.ui.navigate('auth');
      }
    });
